name: CI - Tests and Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel an in-flight CI run if a new commit lands on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        # Linux gets the full matrix (3.10/3.11/3.12).
        # Windows + macOS run a single Python version each — primarily
        # to catch platform-specific bugs (e.g. cp950 encoding default
        # on Windows, see PR #48 for the kind of bug this catches).
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.11'
          - os: macos-latest
            python-version: '3.11'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr ffmpeg

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -e ".[dev]"
        pip install pytest-timeout

    - name: Run tests with pytest
      # --timeout=60 prevents single-test hangs (regression guard for
      # the test_wait_for_task_no_timeout fix in PR #47).
      # --ignore lines skip suites that need optional system tools or
      # heavy services (chromadb, browser drivers, etc.) that aren't
      # always available in CI. The fast subset still covers ~580 tests.
      run: |
        pytest tests/ -v --timeout=60 --tb=short \
          --ignore=tests/test_rag.py \
          --ignore=tests/test_integrations.py \
          --ignore=tests/test_tools_devops.py \
          --ignore=tests/test_tools_media.py \
          --ignore=tests/test_core_task_queue.py
      # test_core_task_queue.py is excluded only on this CI snapshot
      # because it ships ~50 tests that submit to a TaskQueue without
      # calling start() — they pass via timeout. The single intentional
      # hang test is fixed in PR #47; the rest of the file needs a
      # follow-up cleanup PR before re-enabling here.

    - name: Upload pytest output (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: pytest-output-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .pytest_cache/
          /tmp/pytest-*
        retention-days: 7
        if-no-files-found: ignore

  lint:
    name: Linting and Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Don't block the test job on lint — they're independent signals.
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort mypy

    - name: Run Ruff
      run: ruff check ai_automation_framework/ --output-format=github

    - name: Check code formatting with Black
      run: black --check ai_automation_framework/

    - name: Check import sorting with isort
      run: isort --check-only ai_automation_framework/

    - name: Run MyPy type checking
      run: mypy ai_automation_framework/ --ignore-missing-imports

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install scanners
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run pip-audit
      run: pip-audit --requirement requirements.txt
      continue-on-error: true

    - name: Run Bandit
      run: |
        bandit -r ai_automation_framework/ -f json -o bandit-report.json
        bandit -r ai_automation_framework/ -f text -ll
      continue-on-error: true

    - name: Upload Bandit report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json
        retention-days: 30
        if-no-files-found: ignore

  build:
    name: Build Package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [test]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: python-package
        path: dist/
        retention-days: 30
